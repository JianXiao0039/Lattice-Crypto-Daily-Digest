rules:
  - id: hard_negative_without_crypto_context
    description: "If a hard negative keyword appears and no cryptographic context keyword appears, classify as D."
    action: classify_D

  - id: lattice_only_is_not_enough
    description: "If the only relevant keyword is lattice, classify as D unless cryptographic context exists."
    action: classify_D_or_at_most_C

  - id: soft_negative_requires_manual_context
    description: "Soft negative keywords are not sufficient for rejection, but relevance score should be reduced unless cryptographic context exists."
    action: subtract_score

  - id: isogeny_not_lattice
    description: "SQIsign, SIDH, SIKE, CSIDH, and isogeny-only papers are not lattice papers. Classify as C only if they compare against lattice schemes; otherwise D."
    action: classify_C_or_D

  - id: generic_pqc_without_lattice
    description: "Generic PQC papers without explicit lattice schemes are at most B, usually C."
    action: cap_score_B_or_C

score_penalties:
  hard_negative_without_crypto_context: -100
  hard_negative_with_crypto_context: -30
  soft_negative_without_crypto_context: -35
  soft_negative_with_crypto_context: -10
  lattice_only: -60
  generic_pqc_without_lattice_scheme: -20
  ai_without_crypto_context: -40
