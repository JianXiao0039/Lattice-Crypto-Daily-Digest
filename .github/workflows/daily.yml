name: Daily Lattice Crypto Digest

on:
  workflow_dispatch:
  schedule:
    # Asia/Singapore 08:30 == UTC 00:30
    - cron: "30 0 * * *"

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m lattice_digest.run --since 36h --output markdown,json --send none
      - name: Commit digest artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data digests papers.db .cache || true
          if git diff --cached --quiet; then
            echo "No digest changes."
          else
            git commit -m "chore: add daily lattice crypto digest"
            git push
          fi

