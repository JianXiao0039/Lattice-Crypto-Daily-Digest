name: Daily Lattice Crypto Digest

on:
  workflow_dispatch:
  schedule:
    # 01:17 UTC = 09:17 Asia/Shanghai / Asia/Singapore
    - cron: "17 1 * * *"

permissions:
  contents: write

concurrency:
  group: daily-lattice-crypto-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest

      - name: Run daily digest
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          python -m lattice_digest.run --since 36h --output markdown,json --send none

      - name: Verify generated artifacts
        run: |
          set -euo pipefail
          digest_date="$(TZ=Asia/Singapore date +'%Y-%m-%d')"
          markdown_path="digests/${digest_date}.md"
          json_path="data/${digest_date}.json"

          test -f "$markdown_path"
          test -f "$json_path"
          test -f papers.db

          python - "$json_path" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              json.load(handle)
          PY

          for section in "今日结论" "A 类" "B 类" "C 类" "D 类" "今日统计" "明日跟踪建议" "今日一句话总结"; do
            grep -q "$section" "$markdown_path"
          done

      - name: Commit generated digest
        run: |
          digest_date="$(TZ=Asia/Singapore date +'%Y-%m-%d')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- digests/*.md data/*.json papers.db
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
          else
            git commit -m "daily lattice digest: ${digest_date}"
            git push origin main
          fi

      - name: Send digest email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
        run: |
          if [ -n "$SMTP_HOST" ] && [ -n "$SMTP_PORT" ] && [ -n "$SMTP_USERNAME" ] && [ -n "$SMTP_PASSWORD" ] && [ -n "$DIGEST_EMAIL_FROM" ] && [ -n "$DIGEST_EMAIL_TO" ]; then
            python scripts/send_latest_digest_email.py
          else
            echo "Email sending skipped: SMTP secrets not configured."
          fi
