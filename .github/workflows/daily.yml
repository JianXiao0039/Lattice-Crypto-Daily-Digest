name: Daily Lattice Crypto Digest

on:
  workflow_dispatch:
  schedule:
    # 01:17 UTC = 09:17 Asia/Shanghai
    # Avoid the top of the hour to reduce GitHub Actions scheduling delays.
    - cron: "17 1 * * *"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest

      - name: Generate daily digest
        run: |
          python -m lattice_digest.run --since 36h --output markdown,json --send none

      - name: Commit generated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add digests data papers.db

          if git diff --cached --quiet; then
            echo "No digest changes to commit."
          else
            git commit -m "daily lattice digest: $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Send latest digest email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          if [ -f scripts/send_latest_digest_email.py ] && [ -n "$SMTP_HOST" ] && [ -n "$SMTP_PASSWORD" ]; then
            python scripts/send_latest_digest_email.py
          else
            echo "Email sending skipped: script or SMTP secrets not configured."
          fi
