name: Daily Lattice Crypto Digest

on:
  workflow_dispatch:
  schedule:
    # 01:00 UTC = 09:00 Asia/Shanghai
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: daily-lattice-crypto-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort | sed 's#^\./##' | head -200

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pyyaml requests feedparser python-dateutil

      - name: Run daily digest
        run: |
          python -m lattice_digest.run --since 36h --output markdown,json --send none

      - name: Run tests
        run: |
          python -m pytest

      - name: Show generated outputs
        run: |
          echo "Generated digests:"
          ls -la digests || true
          echo "Generated data:"
          ls -la data || true
          echo "Database:"
          ls -la papers.db || true

      - name: Commit and push generated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add digests data papers.db

          if git diff --cached --quiet; then
            echo "No digest/data/papers.db changes to commit."
          else
            TODAY="$(date +'%Y-%m-%d')"
            git commit -m "daily lattice digest: ${TODAY}"
            git push
          fi

      - name: Send digest email
        if: ${{ always() }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -f scripts/send_latest_digest_email.py ] && [ -n "$SMTP_HOST" ] && [ -n "$EMAIL_TO" ]; then
            python scripts/send_latest_digest_email.py
          else
            echo "Email sending skipped: script or SMTP secrets not configured."
          fi
